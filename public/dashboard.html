<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | E • D • T</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bungee&family=Rajdhani:wght@500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-row">
      <a class="brand" href="/index.html">E • D • T</a>

      <button
        class="menu-toggle"
        id="menuToggle"
        type="button"
        aria-label="Open menu"
        aria-expanded="false"
        aria-controls="mobileMenu"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="nav-actions" id="mobileMenu">
        <a class="nav-link" href="/index.html">Home</a>
        <a class="nav-link" href="/dashboard">Dashboard</a>
        <a class="nav-link" href="/form">Add Drink</a>
        <a class="nav-link" id="authNavLink" href="/auth/google">Sign in</a>
      </nav>
    </div>
  </header>

  <main class="container page-content">
    <section class="top-grid">
      <article class="panel">
        <p class="eyebrow">Your tracker</p>
        <h1 class="page-title">Dashboard</h1>
        <p id="authStatus" class="muted">Checking your account...</p>
      </article>

      <article class="panel">
        <p class="eyebrow">Your stats</p>
        <h2>Quick Overview</h2>
        <div class="stats-grid" id="statsGrid">
          <div class="stat-card">
            <span class="stat-label">Total Drinks</span>
            <strong id="statTotal">--</strong>
          </div>
          <div class="stat-card">
            <span class="stat-label">Avg. Caffeine</span>
            <strong id="statCaffeine">--</strong>
          </div>
          <div class="stat-card">
            <span class="stat-label">Avg. Rating</span>
            <strong id="statRating">--</strong>
          </div>
          <div class="stat-card">
            <span class="stat-label">Top Brand</span>
            <strong id="statBrand">--</strong>
          </div>
        </div>
      </article>
    </section>

    <section class="panel collapsible-panel" data-collapsible="filters">
      <button
        class="section-toggle"
        type="button"
        aria-expanded="true"
        aria-controls="filtersContent"
      >
        <span>
          <p class="eyebrow">Filters</p>
          <h2>Your Drinks</h2>
        </span>
        <span class="section-toggle-icon"></span>
      </button>

      <div id="filtersContent" class="section-content">
        <form id="filterForm" class="filter-grid">
          <div class="field">
            <label for="brand">Brand</label>
            <input id="brand" name="brand" type="text" placeholder="Ghost, Monster, C4..." />
          </div>

          <div class="field">
            <label for="search">Search</label>
            <input id="search" name="search" type="text" placeholder="Search your drinks or notes..." />
          </div>

          <div class="field">
            <label for="minCaffeine">Min Caffeine</label>
            <input id="minCaffeine" name="minCaffeine" type="number" min="0" />
          </div>

          <div class="field">
            <label for="maxCaffeine">Max Caffeine</label>
            <input id="maxCaffeine" name="maxCaffeine" type="number" min="0" />
          </div>

          <div class="field">
            <label for="minRating">Min Rating</label>
            <input id="minRating" name="minRating" type="number" min="1" max="10" />
          </div>

          <div class="field">
            <label for="maxRating">Max Rating</label>
            <input id="maxRating" name="maxRating" type="number" min="1" max="10" />
          </div>

          <div class="field">
            <label for="sort">Sort</label>
            <select id="sort" name="sort">
              <option value="newest">Newest</option>
              <option value="oldest">Oldest</option>
              <option value="rating_desc">Highest Rating</option>
              <option value="rating_asc">Lowest Rating</option>
              <option value="caffeine_desc">Most Caffeine</option>
              <option value="caffeine_asc">Least Caffeine</option>
              <option value="brand_asc">Brand A-Z</option>
              <option value="brand_desc">Brand Z-A</option>
            </select>
          </div>

          <div class="field">
            <label for="limit">Per Page</label>
            <select id="limit" name="limit">
              <option value="6">6</option>
              <option value="9" selected>9</option>
              <option value="12">12</option>
            </select>
          </div>

          <div class="filter-actions">
            <button type="submit" class="btn btn-primary">Apply</button>
            <button type="button" class="btn btn-secondary" id="resetFilters">Reset</button>
          </div>
        </form>
      </div>
    </section>

    <section class="panel collapsible-panel" data-collapsible="results">
      <button
        class="section-toggle"
        type="button"
        aria-expanded="true"
        aria-controls="resultsContent"
      >
        <span>
          <p class="eyebrow">Results</p>
          <h2>Your Entries</h2>
        </span>
        <span class="section-toggle-icon"></span>
      </button>

      <div id="resultsContent" class="section-content">
        <div class="panel-header panel-header-inside">
          <p id="resultsMeta" class="muted"></p>
        </div>

        <p id="messageBox" class="message" hidden></p>

        <div id="drinksGrid" class="card-grid"></div>

        <div class="pagination-row">
          <button class="btn btn-secondary" id="prevPage" type="button">Previous</button>
          <span id="pageLabel" class="muted">Page 1</span>
          <button class="btn btn-secondary" id="nextPage" type="button">Next</button>
        </div>
      </div>
    </section>
  </main>

  <script src="/js/site-menu.js"></script>
  <script src="/js/collapsible-sections.js"></script>
  <script type="module" src="/js/dashboard.js"></script>
</body>
</html>
